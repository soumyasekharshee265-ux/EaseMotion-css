<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Status Indicator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Animated Status Indicator</h1>

    <div class="status-container">
        <div class="user">
            <div class="avatar">
                <span class="status online"></span>
            </div>
            <p>Online</p>
        </div>

        <div class="user">
            <div class="avatar">
                <span class="status away"></span>
            </div>
            <p>Away</p>
        </div>

        <div class="user">
            <div class="avatar">
                <span class="status busy"></span>
            </div>
            <p>Busy</p>
        </div>

        <div class="user">
            <div class="avatar">
                <span class="status offline"></span>
            </div>
            <p>Offline</p>
        </div>
    </div>

</body>
</html>
